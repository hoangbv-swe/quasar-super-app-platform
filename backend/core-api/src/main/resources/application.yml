# ===============================================================================================
# QUASAR CORE API - BASE CONFIGURATION
# File cấu hình gốc (Base). Chứa các thông số dùng chung cho mọi môi trường.
# ===============================================================================================

# -----------------------------------------------------------------------------------------------
# 1. CORE APPLICATION & INFRASTRUCTURE CONFIGURATION
# -----------------------------------------------------------------------------------------------
server:
  port: 8088

api:
  prefix: /api/v1

# -----------------------------------------------------------------------------------------------
# 2. FRAMEWORK & PLATFORM SETTINGS
# -----------------------------------------------------------------------------------------------
spring:
  application:
    name: quasar-core-api
  profiles:
    active: "@spring.profiles.active@"

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Ho_Chi_Minh

  messages:
    basename: i18n/messages
    encoding: UTF-8
    default-locale: vi

  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

# -----------------------------------------------------------------------------------------------
# 3. API SPECIFICATION & DEVELOPER TOOLS
# -----------------------------------------------------------------------------------------------
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs
  show-actuator: true

# -----------------------------------------------------------------------------------------------
# 4. SYSTEM OPERATIONS & MONITORING
# -----------------------------------------------------------------------------------------------
management:
  endpoint:
    health:
      show-details: always
  endpoints:
    web:
      base-path: /api/v1/actuator
      exposure:
        include: "health, info"
