# ===============================================================================================
# DEVELOPMENT PROFILE
# File cấu hình dành riêng cho môi trường Development (Local/Dev)
# ===============================================================================================

# -----------------------------------------------------------------------------------------------
# 1. DATA PERSISTENCE, MESSAGING & IDENTITY
# -----------------------------------------------------------------------------------------------
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/quasar_platform?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    hibernate:
      ddl-auto: validate

# -----------------------------------------------------------------------------------------------
# 2. EXTERNAL SERVICES & CUSTOM APP PROPERTIES
# -----------------------------------------------------------------------------------------------
jwt:
  secretKey: ${JWT_SECRET_DEV}
  expiration: 3600000
  expiration-refresh-token: 2592000000

# -----------------------------------------------------------------------------------------------
# 3. LOGGING & DIAGNOSTICS
# -----------------------------------------------------------------------------------------------
logging:
  level:
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
