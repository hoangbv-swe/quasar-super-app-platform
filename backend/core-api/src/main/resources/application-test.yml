# ===============================================================================================
# TEST PROFILE
# File cấu hình dành riêng cho môi trường chạy Test tự động (CI/CD hoặc Local Test).
# ===============================================================================================

# -----------------------------------------------------------------------------------------------
# 1. DATA PERSISTENCE, MESSAGING & IDENTITY
# -----------------------------------------------------------------------------------------------
spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: create-drop

  data:
    redis:
      host: localhost
      port: 6379

# -----------------------------------------------------------------------------------------------
# 2. EXTERNAL SERVICES & CUSTOM APP PROPERTIES
# -----------------------------------------------------------------------------------------------
jwt:
  secretKey: ${JWT_SECRET_TEST}
  expiration: 3600000
  expiration-refresh-token: 2592000000

aws:
  s3:
    bucket: ${AWS_S3_BUCKET_TEST}
    region: ${AWS_S3_REGION_TEST}
    access: ${AWS_ACCESS_KEY_TEST}
    secret: ${AWS_SECRET_KEY_TEST}

vnpay:
  pay-url: "http://dummy-vnpay-url"
  return-url: "http://dummy-return-url"
  api-url: "http://dummy-vnpay-api"
  tmn-code: ${VNPAY_TMN_CODE_TEST}
  secret-key: ${VNPAY_SECRET_KEY_TEST}

sendgrid:
  api-key: ${SENDGRID_API_KEY_TEST}
  from-email: ${SENDGRID_FROM_EMAIL_TEST}

# -----------------------------------------------------------------------------------------------
# 3. LOGGING & DIAGNOSTICS
# -----------------------------------------------------------------------------------------------
logging:
  level:
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
